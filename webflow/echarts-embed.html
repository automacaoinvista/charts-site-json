<!--
  ============================================================================
  COMPONENTE ECHARTS GENÉRICO E RESPONSIVO — inVista
  ----------------------------------------------------------------------------
  COMO USAR NO WEBFLOW:
  1) Adicione um elemento "Embed" (HTML Embed) onde quer o gráfico.
  2) Cole TODO este bloco no PRIMEIRO gráfico da página.
     Para gráficos adicionais, cole só a <div class="invista-chart" data-src="...">
     — o script já carregado serve todos.
  3) Troque o data-src pela URL pública do JSON do fundo.

  Responsivo: a altura é fluida (clamp) e o gráfico re-renderiza ao redimensionar.
  No celular as fontes e eixos encolhem automaticamente (media queries do ECharts).
  Para atualizar os dados, NINGUÉM mexe no Webflow: basta atualizar o Excel.
  ============================================================================
-->

<!-- 1 gráfico = 1 div. Altura fluida: mín 260px, ~52% da largura, máx 440px. -->
<div class="invista-chart"
     data-src="https://automacaoinvista.github.io/charts-site-json/credito.json"
     style="width:100%;height:clamp(260px,52vw,440px);"></div>

<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<script>
(function () {
  if (window.__invistaChartsInit) return;
  window.__invistaChartsInit = true;

  var PALETTE = ["#066B5E", "#D6E94B", "#0E9384", "#9CA3AF", "#1F2937"];
  function fmtPct(v){return v.toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2})+"%";}
  function fmtIndex(v){return v.toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2});}
  function hexA(hex,a){var h=hex.replace("#","");return "rgba("+parseInt(h.substr(0,2),16)+","+parseInt(h.substr(2,2),16)+","+parseInt(h.substr(4,2),16)+","+a+")";}

  function render(el, cfg) {
    var isCumulative = (cfg.mode || "").indexOf("cumulative") === 0;
    var isPct = cfg.mode === "monthly" || cfg.mode === "cumulative_pct";
    var fmt = isPct ? fmtPct : fmtIndex;
    var isBar = (cfg.type || (cfg.mode === "monthly" ? "bar" : "line")) === "bar";

    var chart = echarts.init(el, null, { renderer: "canvas" });

    var series = (cfg.series || []).map(function (s, i) {
      var color = s.color || PALETTE[i % PALETTE.length];
      return {
        name: s.name,
        type: isBar ? "bar" : "line",
        smooth: !isBar,
        showSymbol: false,
        symbol: "circle",
        symbolSize: 6,
        lineStyle: { width: 2.5 },
        itemStyle: { color: color },
        emphasis: { focus: "series" },
        areaStyle: (!isBar && i === 0 && isCumulative)
          ? { color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
              { offset: 0, color: hexA(color, 0.18) },
              { offset: 1, color: hexA(color, 0.0) }]) }
          : undefined,
        data: s.data
      };
    });

    // ---- baseOption = desktop; media = ajustes por largura ----
    chart.setOption({
      baseOption: {
        color: PALETTE,
        title: {
          text: cfg.title || "", subtext: cfg.subtitle || "", left: "left",
          textStyle: { color: "#111827", fontSize: 18, fontWeight: 600, fontFamily: "inherit" },
          subtextStyle: { color: "#6B7280", fontSize: 12, fontFamily: "inherit" }
        },
        grid: { left: 12, right: 18, top: 78, bottom: 28, containLabel: true },
        tooltip: {
          trigger: "axis", confine: true,
          backgroundColor: "rgba(17,24,39,0.92)", borderWidth: 0,
          textStyle: { color: "#fff", fontFamily: "inherit" },
          valueFormatter: function (v) { return v == null ? "-" : fmt(v); }
        },
        legend: {
          bottom: 0, icon: "roundRect", itemWidth: 14, itemHeight: 8,
          textStyle: { color: "#374151", fontFamily: "inherit", fontSize: 12 }
        },
        xAxis: {
          type: "category", boundaryGap: isBar, data: cfg.labels || [],
          axisLine: { lineStyle: { color: "#E5E7EB" } }, axisTick: { show: false },
          axisLabel: { color: "#6B7280", fontFamily: "inherit", fontSize: 12, hideOverlap: true }
        },
        yAxis: {
          type: "value", scale: true,
          splitLine: { lineStyle: { color: "#F3F4F6" } },
          axisLabel: { color: "#6B7280", fontFamily: "inherit", fontSize: 12,
                       formatter: function (v) { return fmt(v); } }
        },
        series: series
      },
      media: [
        { // telas estreitas (celular)
          query: { maxWidth: 560 },
          option: {
            title:  { textStyle: { fontSize: 14 }, subtextStyle: { fontSize: 10 } },
            grid:   { left: 4, right: 8, top: 60, bottom: 22 },
            legend: { itemWidth: 10, itemHeight: 6, textStyle: { fontSize: 10 } },
            xAxis:  { axisLabel: { fontSize: 9, hideOverlap: true } },
            yAxis:  { axisLabel: { fontSize: 9 } }
          }
        },
        { // tablet
          query: { minWidth: 561, maxWidth: 860 },
          option: {
            title:  { textStyle: { fontSize: 16 }, subtextStyle: { fontSize: 11 } },
            grid:   { top: 68 },
            xAxis:  { axisLabel: { fontSize: 10 } },
            yAxis:  { axisLabel: { fontSize: 10 } }
          }
        },
        { // desktop
          query: { minWidth: 861 },
          option: {
            title:  { textStyle: { fontSize: 18 }, subtextStyle: { fontSize: 12 } },
            grid:   { top: 78 }
          }
        }
      ]
    });

    return chart;
  }

  function boot() {
    document.querySelectorAll(".invista-chart[data-src]").forEach(function (el) {
      if (el.__invistaDone) return;
      el.__invistaDone = true;
      fetch(el.getAttribute("data-src"), { cache: "no-store" })
        .then(function (r) { return r.json(); })
        .then(function (cfg) {
          var chart = render(el, cfg);
          // re-renderiza quando o container muda de tamanho (responsivo)
          var raf;
          function doResize() { cancelAnimationFrame(raf); raf = requestAnimationFrame(function () { chart.resize(); }); }
          new ResizeObserver(doResize).observe(el);
          window.addEventListener("resize", doResize);
          window.addEventListener("orientationchange", doResize);
        })
        .catch(function (e) {
          el.innerHTML = '<div style="color:#9CA3AF;font:14px sans-serif;display:flex;'
            + 'align-items:center;justify-content:center;height:100%">Não foi possível carregar o gráfico.</div>';
          console.error("[invista-chart]", e);
        });
    });
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", boot);
  } else { boot(); }
})();
</script>
