name: Atualizar JSON dos gráficos

on:
  schedule:
    # 5x/dia em horário de Brasília (BRT = UTC-3): 08h, 12h, 15h, 16h e 20h
    - cron: "0 11,15,18,19,23 * * *"
  workflow_dispatch: {}        # botão "Run workflow" manual
  push:
    branches: [ main ]
    paths:
      - "build_charts.py"
      - "config.json"
      - ".github/workflows/build.yml"

permissions:
  contents: write              # para commitar os JSON atualizados
  pages: write
  id-token: write

concurrency:
  group: build-json
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install requests

      - name: Gerar JSON
        env:
          SP_TENANT_ID:     ${{ secrets.SP_TENANT_ID }}
          SP_CLIENT_ID:     ${{ secrets.SP_CLIENT_ID }}
          SP_CLIENT_SECRET: ${{ secrets.SP_CLIENT_SECRET }}
          BUILD_TIME:       ${{ github.event.repository.updated_at }}
        run: python build_charts.py

      - name: Commit dos JSON (se mudaram)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/*.json
          if git diff --cached --quiet; then
            echo "Sem mudanças nos dados."
          else
            git commit -m "chore: atualiza JSON dos gráficos [skip ci]"
            git push
          fi

  deploy-hostinger:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Checar credenciais FTP
        id: creds
        run: |
          if [ -n "${{ secrets.FTP_SERVER }}" ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "Secrets FTP_* ausentes — deploy Hostinger pulado."
          fi
      - name: Enviar docs/ para a Hostinger (FTPS)
        if: steps.creds.outputs.ok == 'true'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          local-dir: docs/
          server-dir: ./

  deploy-pages:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deployment
        uses: actions/deploy-pages@v4
