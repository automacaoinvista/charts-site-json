name: Atualizar JSON dos gráficos

on:
  schedule:
    - cron: "0 * * * *"      # de hora em hora (UTC). Ajuste se quiser.
  workflow_dispatch: {}        # botão "Run workflow" manual
  push:
    branches: [ main ]
    paths:
      - "build_charts.py"
      - "config.json"
      - ".github/workflows/build.yml"

permissions:
  contents: write              # para commitar os JSON atualizados
  pages: write
  id-token: write

concurrency:
  group: build-json
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install requests

      - name: Gerar JSON
        env:
          SP_TENANT_ID:     ${{ secrets.SP_TENANT_ID }}
          SP_CLIENT_ID:     ${{ secrets.SP_CLIENT_ID }}
          SP_CLIENT_SECRET: ${{ secrets.SP_CLIENT_SECRET }}
          BUILD_TIME:       ${{ github.event.repository.updated_at }}
        run: python build_charts.py

      - name: Commit dos JSON (se mudaram)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/*.json
          if git diff --cached --quiet; then
            echo "Sem mudanças nos dados."
          else
            git commit -m "chore: atualiza JSON dos gráficos [skip ci]"
            git push
          fi

  deploy-pages:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deployment
        uses: actions/deploy-pages@v4
